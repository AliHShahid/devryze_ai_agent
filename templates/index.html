<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devryze Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f10;
            color: #e8e8ea;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 24px 16px;
        }

        .container {
            width: 100%;
            max-width: 820px;
            background: #1a1b1e;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
            border: 1px solid #2a2b2f;
            display: flex;
            flex-direction: column;
            height: 92vh;
            max-height: 860px;
        }

        .header {
            background: #1a1b1e;
            color: #e8e8ea;
            padding: 16px 20px;
            border-radius: 16px 16px 0 0;
            text-align: left;
            border-bottom: 1px solid #2a2b2f;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header p {
            font-size: 12px;
            opacity: 0.75;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 22px 10px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message {
            display: flex;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .user-message .message-content {
            background: #2f7d6d;
            color: #f7f7f7;
            border-bottom-right-radius: 4px;
        }

        .bot-message .message-content {
            background: #232427;
            color: #e8e8ea;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 16px 20px 20px;
            border-top: 1px solid #2a2b2f;
            display: flex;
            gap: 12px;
            background: #1a1b1e;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #2f3136;
            border-radius: 999px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #101113;
            color: #e8e8ea;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3e8c7d;
            box-shadow: 0 0 0 3px rgba(62, 140, 125, 0.25);
        }

        button {
            width: 44px;
            height: 44px;
            padding: 0;
            background: #2f7d6d;
            color: #f7f7f7;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: #2b6f61;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(47, 125, 109, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #3a3b40;
            color: #9a9ca3;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9aa0a6;
            font-size: 14px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9aa0a6;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .error-message {
            background: #2a1d1d;
            color: #f5c2c2;
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 4px solid #c62828;
        }

        @media (max-width: 480px) {
            .container {
                max-height: none;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }

            .header h1 {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Devryze Chatbot</h1>
            <p>Ask me anything about Devryze</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="bot-message">
                <div class="message-content">
                    Hello! I'm the Devryze Agent. How can I help you today?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Send a message" autocomplete="off">
                <button id="sendButton" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        let isLoading = false;

        // Generate a unique user ID for this session
        const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        // Handle Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading) {
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message || isLoading) return;

            // Disable input
            isLoading = true;
            sendButton.disabled = true;

            // Add user message to chat
            addMessageToChat(message, 'user');
            messageInput.value = '';

            // Show loading indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'bot-message';
            loadingDiv.innerHTML = `
                <div class="message-content">
                    <div class="loading">
                        <span class="loading-dot"></span>
                        <span class="loading-dot"></span>
                        <span class="loading-dot"></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chatbot/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        user_id: userId
                    })
                });

                const data = await response.json();

                // Remove loading indicator
                loadingDiv.remove();

                if (response.ok) {
                    addMessageToChat(data.bot_response, 'bot');
                } else {
                    addMessageToChat(`Error: ${data.error || 'An error occurred'}`, 'error');
                }
            } catch (error) {
                loadingDiv.remove();
                addMessageToChat(`Network error: ${error.message}`, 'error');
            } finally {
                isLoading = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function addMessageToChat(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;

            const messageContent = document.createElement('div');

            if (type === 'error') {
                messageContent.className = 'error-message';
                messageContent.textContent = message;
            } else {
                messageContent.className = 'message-content';
                messageContent.textContent = message;
            }

            messageDiv.appendChild(messageContent);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 0);
        }
    </script>
</body>

</html>
